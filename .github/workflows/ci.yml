name: CI

on:
  push:
    branches:
      - main
      - staging
  pull_request:
    branches:
      - main
      - staging
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    env:
      CI: true
      NODE_ENV: test
      JWT_SECRET: test-jwt-secret
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json
            client/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Install client dependencies
        working-directory: client
        run: npm ci

      - name: Run repo verification
        run: npm run verify

  release_artifacts:
    name: Release Gate
    needs: verify
    if: github.event_name == 'push' && (github.ref_name == 'main' || github.ref_name == 'staging')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    environment:
      name: ${{ github.ref_name == 'main' && 'production' || 'staging' }}
    env:
      CI: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json
            client/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install client dependencies
        working-directory: client
        run: npm ci

      - name: Build client artifact
        run: npm run build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist-${{ github.ref_name }}
          path: client/dist
          if-no-files-found: error

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-source-${{ github.ref_name }}
          path: |
            backend
            !backend/node_modules
            !backend/.env
          if-no-files-found: error

      - name: Deployment handoff note
        run: |
          echo "Verified artifacts prepared for ${{ github.ref_name }}."
          echo "Connect this environment to the hosting platform in Phase 10 and Phase 11."
