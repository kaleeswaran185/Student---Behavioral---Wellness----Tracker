services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env.staging
    ports:
      - "5000:5000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:5000/health').then((res)=>process.exit(res.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s

  web:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_DEMO_MODE: ${VITE_DEMO_MODE:-false}
        VITE_API_BASE_URL: ${STAGING_API_PUBLIC_URL:-http://localhost:5000}
        VITE_API_PROXY_TARGET: ${VITE_API_PROXY_TARGET:-http://localhost:5000}
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "8080:80"
    restart: unless-stopped
