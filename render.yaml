services:
  - type: web
    name: student-behavioral-wellness-tracker
    env: docker
    dockerContext: ./backend
    dockerfilePath: ./backend/Dockerfile
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: BODY_LIMIT
        value: 1mb
      - key: LOG_LEVEL
        value: info
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: CLIENT_ORIGIN
        sync: false
  - type: static_site
    name: sbwt-web
    rootDir: client
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_DEMO_MODE
        value: "false"
      - key: VITE_API_BASE_URL
        sync: false
